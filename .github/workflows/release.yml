name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build wasm (release)
        run: cargo build --release --target wasm32-unknown-unknown --lib

      # Version must match wasm-bindgen crate version in Cargo.lock (currently 0.2.114)
      - name: Download wasm-bindgen-cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BINDGEN_VERSION="0.2.114"
          ASSET="wasm-bindgen-${BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          gh release download "${BINDGEN_VERSION}" --repo wasm-bindgen/wasm-bindgen --pattern "${ASSET}"
          tar xzf "${ASSET}"
          mv "wasm-bindgen-${BINDGEN_VERSION}-x86_64-unknown-linux-musl/wasm-bindgen" /usr/local/bin/
          wasm-bindgen --version

      - name: Generate JS glue with wasm-bindgen
        run: |
          wasm-bindgen \
            --target web \
            --out-dir web/pkg \
            --out-name world_gen \
            target/wasm32-unknown-unknown/release/world_gen.wasm

      - name: Generate version tag
        id: version
        run: echo "tag=v$(date +%Y%m%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        run: cd web && zip -r ../world-gen-web.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-gen-web-zip
          path: world-gen-web.zip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

    outputs:
      tag: ${{ steps.version.outputs.tag }}

  build-native:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: world-gen-macos-aarch64
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: world-gen-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build executable (release)
        run: cargo build --release --target ${{ matrix.target }} --bin world-gen

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/world-gen staging/
          cd staging && zip -r ../${{ matrix.artifact }}.zip .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging
          Copy-Item "target/${{ matrix.target }}/release/world-gen.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    needs: [build-wasm, build-native]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.build-wasm.outputs.tag }}" \
            --generate-notes \
            --title "${{ needs.build-wasm.outputs.tag }}" \
            artifacts/world-gen-web-zip/world-gen-web.zip \
            artifacts/world-gen-macos-aarch64/world-gen-macos-aarch64.zip \
            artifacts/world-gen-windows-x86_64/world-gen-windows-x86_64.zip
